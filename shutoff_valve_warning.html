<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shut-Off Valve Warning</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      font-family: 'Open Sans', sans-serif;
      height: 100%;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 18px 4px rgba(239, 12, 12, 0.45), 0 4px 24px rgba(160, 5, 5, 0.35); }
      50%       { box-shadow: 0 0 32px 10px rgba(239, 12, 12, 0.6), 0 6px 32px rgba(160, 5, 5, 0.5); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: scale(0.94) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      30%      { transform: translateY(-7px); }
      60%      { transform: translateY(-3px); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .callout {
      background: linear-gradient(135deg, #EF0C0C, #FF5C5C, #A00505, #EF0C0C);
      background-size: 300% 300%;
      animation:
        gradientShift 7s ease infinite,
        pulseGlow 3s ease-in-out infinite,
        slideIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      border-radius: 12px;
      padding: 8px 14px 10px;
      width: 100%;
      opacity: 0;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.22);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 5px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.45s forwards;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.6s forwards;
    }

    .icon {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
      animation: bounce 0.7s ease 0.7s 2;
      display: inline-block;
    }

    .message-text {
      color: #ffffff;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.45;
    }

    .message-text strong {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="callout">
    <div class="badge">Important Warning</div>
    <div class="message-row">
      <span class="icon">⚠️</span>
      <p class="message-text">
        Make sure the shut-off valve for inlet water is <strong>OFF</strong> before powering on the chiller or the head unit. This will be completed during the Install Wizard.
      </p>
    </div>
  </div>
</body>
</html>
